<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目报告 - 项目管理系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        header h1 { font-size: 24px; }
        nav { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; background: rgba(255,255,255,0.2); }
        nav a:hover { background: rgba(255,255,255,0.3); }
        nav a.active { background: rgba(255,255,255,0.4); }
        
        main { padding: 20px; max-width: 1000px; margin: 0 auto; }
        
        .report-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 15px 30px; background: white; border: none; border-radius: 12px 12px 0 0; cursor: pointer; font-size: 16px; font-weight: 500; }
        .tab-btn.active { background: #667eea; color: white; }
        
        .report-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .report-header { border-bottom: 2px solid #667eea; padding-bottom: 20px; margin-bottom: 30px; }
        .report-title { font-size: 28px; font-weight: bold; color: #333; }
        .report-period { color: #666; font-size: 16px; margin-top: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #f9f9f9; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h4 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #667eea; }
        
        .section { margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .task-list { }
        .task-item { padding: 15px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .task-item:last-child { border-bottom: none; }
        .task-name { font-size: 15px; }
        .task-meta { color: #666; font-size: 13px; }
        
        .project-item { padding: 15px; border-bottom: 1px solid #e0e0e0; }
        .project-item h4 { font-size: 16px; margin-bottom: 5px; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; margin-top: 10px; }
        .progress-fill { height: 100%; border-radius: 5px; background: #4caf50; }
        
        .person-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .person-card { background: #f5f5f5; padding: 15px; border-radius: 8px; }
        .person-card h4 { font-size: 15px; margin-bottom: 10px; }
        .person-card .stats { font-size: 13px; color: #666; }
        
        .export-actions { display: flex; gap: 15px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
        .export-btn { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .export-btn:hover { background: #764ba2; }
        
        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        @media print {
            header, .report-tabs, .export-actions { display: none; }
            .report-container { box-shadow: none; }
        }
    </style>
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <header>
        <h1>📊 项目报告</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="projects.html">项目列表</a>
            <a href="tasks.html">任务管理</a>
            <a href="gantt.html">甘特图</a>
            <a href="report.html" class="active">📊 报告</a>
        <a href="settings.html">⚙️ 个人设置</a><span style="margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer;opacity:0.7" onclick="showGlobalSearch()" title="全局搜索 (Ctrl+K)">🔍 <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:4px;font-size:12px">Ctrl+K</span></span><span id="notification-bell" style="cursor:pointer;position:relative;font-size:18px;margin-left:8px;" onclick="toggleNotificationPanel()" title="通知">🔔<span id="notification-badge" style="display:none;position:absolute;top:-5px;right:-8px;background:#f44336;color:white;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:600;">0</span></span><span class="dark-mode-btn" style="cursor:pointer;font-size:18px;margin-left:8px;" onclick="toggleDarkMode()" title="切换暗黑模式">🌙</span></nav>
    </header>
    
    <!-- 全局搜索 -->
    <div id="global-search-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;backdrop-filter:blur(2px);" onclick="hideGlobalSearch()">
        <div style="max-width:600px;margin:80px auto 0;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #eee;gap:10px;">
                <span style="font-size:20px">🔍</span>
                <input type="text" id="global-search-input" placeholder="搜索项目、任务、人员..." style="flex:1;border:none;font-size:16px;outline:none;" oninput="doGlobalSearch()" onkeydown="handleSearchKey(event)">
                <kbd style="background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:12px;color:#888">ESC</kbd>
            </div>
            <div id="global-search-results" style="max-height:400px;overflow-y:auto;padding:8px;"></div>
        </div>
    </div>
    <!-- 通知面板 -->
    <div id="notification-panel" style="display:none;position:fixed;top:60px;right:20px;width:360px;max-height:500px;background:white;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.15);z-index:9998;overflow:hidden;">
        <div style="padding:12px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-size:15px;margin:0;">🔔 通知</h3>
            <div><a onclick="markAllNotificationsRead()" style="font-size:12px;color:#667eea;cursor:pointer;margin-right:10px;">全部已读</a><a onclick="toggleNotificationPanel()" style="cursor:pointer;font-size:16px;">✕</a></div>
        </div>
        <div id="notification-list" style="max-height:420px;overflow-y:auto;"></div>
    </div>

    <main>
        <div class="report-tabs">
            <button class="tab-btn active" onclick="showReport('weekly')">📅 周报</button>
            <button class="tab-btn" onclick="showReport('monthly')">📆 月报</button>
        </div>
        
        <div class="report-container" id="report-content">
            <div class="empty-state">⏳ 加载中...</div>
        </div>
    </main>
    
        <script src="auth.js"></script>
<script>
        const API = '/api';
        let _gsData = {projects:[], tasks:[], persons:[]};

        // 通知功能
        async function loadNotifications() {
            try {
                const res = await authFetch(`${API}/notifications`);
                const data = await res.json();
                const notifs = data.notifications || [];
                const unread = notifs.filter(n => !n.is_read).length;
                const badge = document.getElementById('notification-badge');
                if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline'; }
                else { badge.style.display = 'none'; }
                const list = document.getElementById('notification-list');
                if (!notifs.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#999">暂无通知</div>'; return; }
                const typeIcons = {task_assigned:'📋',task_completed:'✅',task_updated:'🔄',comment_added:'💬',issue_created:'⚠️'};
                list.innerHTML = notifs.slice(0,20).map(n => `<div style="padding:10px 16px;border-bottom:1px solid #f5f5f5;${n.is_read?'':'background:#f0f4ff;'}cursor:pointer;" onclick="handleNotificationClick(${n.id},'${n.entity_type||''}',${n.entity_id||0})"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">${typeIcons[n.type]||'🔔'}</span><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:${n.is_read?'400':'600'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${n.title||''}</div><div style="font-size:12px;color:#888;margin-top:2px;">${n.content||''}</div></div></div></div>`).join('');
            } catch(e) {}
        }
        function toggleNotificationPanel() {
            const panel = document.getElementById('notification-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') loadNotifications();
        }
        async function handleNotificationClick(nid, entityType, entityId) {
            await authFetch(`${API}/notifications/${nid}/read`, {method:'POST'});
            toggleNotificationPanel();
            if (entityType === 'task' && entityId) window.location.href = 'tasks.html';
            else if (entityType === 'project' && entityId) window.location.href = `project.html?id=${entityId}`;
        }
        async function markAllNotificationsRead() {
            try { await authFetch(`${API}/notifications/read-all`, {method:'POST'}); loadNotifications(); } catch(e) {}
        }
        loadNotifications();

        // 全局搜索
        function showGlobalSearch() {
            document.getElementById('global-search-overlay').style.display = 'block';
            const input = document.getElementById('global-search-input');
            input.value = ''; input.focus();
            document.getElementById('global-search-results').innerHTML = '<div style="padding:20px;text-align:center;color:#999">输入关键词搜索项目、任务、人员</div>';
        }
        function hideGlobalSearch() { document.getElementById('global-search-overlay').style.display = 'none'; }
        async function doGlobalSearch() {
            const q = document.getElementById('global-search-input').value.trim().toLowerCase();
            if (!q) { document.getElementById('global-search-results').innerHTML = '<div style="padding:20px;text-align:center;color:#999">输入关键词搜索项目、任务、人员</div>'; return; }
            if (_gsData.projects.length === 0) {
                try {
                    const [pR, tR, peR] = await Promise.all([authFetch(`${API}/projects`), authFetch(`${API}/tasks`), authFetch(`${API}/persons`)]);
                    _gsData.projects = (await pR.json()).projects || [];
                    _gsData.tasks = (await tR.json()).tasks || [];
                    _gsData.persons = (await peR.json()).persons || [];
                } catch(e) {}
            }
            const res = [];
            _gsData.projects.filter(p => p.name.toLowerCase().includes(q)).slice(0,5).forEach(p => res.push({t:'project',i:'📁',n:p.name,d:`进度 ${p.progress||0}%`,l:`project.html?id=${p.id}`}));
            _gsData.tasks.filter(t => (t.name||'').toLowerCase().includes(q)).slice(0,8).forEach(t => res.push({t:'task',i:'📋',n:t.name,d:`${t.project_name||''} · ${t.assignee_name||'未分配'}`,l:'tasks.html'}));
            _gsData.persons.filter(p => p.name.toLowerCase().includes(q)).slice(0,5).forEach(p => res.push({t:'person',i:'👤',n:p.name,d:`${p.line||''} ${p.position||''}`,l:'persons.html'}));
            const c = document.getElementById('global-search-results');
            if (!res.length) { c.innerHTML = '<div style="padding:20px;text-align:center;color:#999">未找到相关结果</div>'; return; }
            c.innerHTML = res.map(r => `<a href="${r.l}" style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;text-decoration:none;color:#333" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background=''"><span style="font-size:18px">${r.i}</span><div style="flex:1"><div style="font-weight:500">${r.n}</div><div style="font-size:12px;color:#888">${r.d}</div></div><span style="font-size:11px;color:#bbb;background:#f5f5f5;padding:2px 6px;border-radius:3px">${r.t==='project'?'项目':r.t==='task'?'任务':'人员'}</span></a>`).join('');
        }
        function handleSearchKey(e) { if (e.key === 'Escape') hideGlobalSearch(); }
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); showGlobalSearch(); } });


        let currentReport = 'weekly';
        
        async function loadReport(type) {
            currentReport = type;
            const endpoint = type === 'weekly' ? '/report/weekly' : '/report/monthly';
            
            try {
                const res = await authFetch(`${API}${endpoint}`);
                const data = await res.json();
                
                if (data.success) {
                    renderReport(data.report);
                } else {
                    document.getElementById('report-content').innerHTML = 
                        '<div class="empty-state">❌ 加载失败</div>';
                }
            } catch (e) {
                console.error('加载报告失败:', e);
                document.getElementById('report-content').innerHTML = 
                    '<div class="empty-state">❌ 加载失败，请检查服务是否重启</div>';
            }
        }
        
        function renderReport(report) {
            const container = document.getElementById('report-content');
            
            if (report.type === 'weekly') {
                container.innerHTML = renderWeeklyReport(report);
            } else {
                container.innerHTML = renderMonthlyReport(report);
            }
        }
        
        function renderWeeklyReport(report) {
            const stats = report.stats;
            
            return `
                <div class="report-header">
                    <div class="report-title">📊 项目管理周报</div>
                    <div class="report-period">报告周期：${report.period}</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>✅ 本周完成任务</h4>
                        <div class="number">${stats.completed_tasks}</div>
                    </div>
                    <div class="stat-card">
                        <h4>📝 新建任务</h4>
                        <div class="number">${stats.new_tasks}</div>
                    </div>
                    <div class="stat-card">
                        <h4>🔧 解决问题</h4>
                        <div class="number">${stats.resolved_issues}</div>
                    </div>
                    <div class="stat-card">
                        <h4>📁 进行中项目</h4>
                        <div class="number">${stats.active_projects}</div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">✅ 本周完成的任务</div>
                    <div class="task-list">
                        ${report.completed_tasks.length > 0 
                            ? report.completed_tasks.map(t => `
                                <div class="task-item">
                                    <div>
                                        <div class="task-name">${t.name}</div>
                                        <div class="task-meta">项目: ${t.project_name || '-'} | 完成: ${t.completed_date || '-'}</div>
                                    </div>
                                    <span style="color: #4caf50;">✅</span>
                                </div>
                            `).join('')
                            : '<div class="empty-state">本周无完成任务</div>'
                        }
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📁 进行中的项目</div>
                    <div class="task-list">
                        ${report.active_projects.length > 0 
                            ? report.active_projects.map(p => `
                                <div class="project-item">
                                    <h4>${p.name}</h4>
                                    <div class="task-meta">负责人: ${p.owner_name || '-'} | 进度: ${p.progress}%</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${p.progress}%"></div>
                                    </div>
                                </div>
                            `).join('')
                            : '<div class="empty-state">无进行中项目</div>'
                        }
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📝 本周新建任务</div>
                    <div class="task-list">
                        ${report.new_tasks.length > 0 
                            ? report.new_tasks.slice(0, 10).map(t => `
                                <div class="task-item">
                                    <div>
                                        <div class="task-name">${t.name}</div>
                                        <div class="task-meta">项目: ${t.project_name || '-'}</div>
                                    </div>
                                    <span style="color: #ff9800;">⏳</span>
                                </div>
                            `).join('')
                            : '<div class="empty-state">本周无新建任务</div>'
                        }
                    </div>
                </div>
                
                <div class="export-actions">
                    <button class="export-btn" onclick="exportReport('html')">📥 导出HTML</button>
                    <button class="export-btn" onclick="window.print()">🖨️ 打印报告</button>
                </div>
            `;
        }
        
        function renderMonthlyReport(report) {
            const stats = report.stats;
            
            return `
                <div class="report-header">
                    <div class="report-title">📊 项目管理月报</div>
                    <div class="report-period">报告周期：${report.period}</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>✅ 完成任务</h4>
                        <div class="number">${stats.completed_tasks}</div>
                    </div>
                    <div class="stat-card">
                        <h4>📁 完成项目</h4>
                        <div class="number">${stats.completed_projects}</div>
                    </div>
                    <div class="stat-card">
                        <h4>🔧 解决问题</h4>
                        <div class="number">${stats.resolved_issues}</div>
                    </div>
                    <div class="stat-card">
                        <h4>👥 参与人员</h4>
                        <div class="number">${report.person_stats.length}</div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">👥 人员绩效统计</div>
                    <div class="person-stats">
                        ${report.person_stats.map(p => `
                            <div class="person-card">
                                <h4>${p.name || '未知'}</h4>
                                <div class="stats">
                                    总任务: ${p.task_count || 0}<br>
                                    已完成: ${p.completed_count || 0}<br>
                                    完成率: ${p.task_count > 0 ? Math.round(p.completed_count / p.task_count * 100) : 0}%
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">✅ 本月完成的任务</div>
                    <div class="task-list">
                        ${report.completed_tasks.length > 0 
                            ? report.completed_tasks.slice(0, 20).map(t => `
                                <div class="task-item">
                                    <div>
                                        <div class="task-name">${t.name}</div>
                                        <div class="task-meta">项目: ${t.project_name || '-'} | 完成: ${t.completed_date || '-'}</div>
                                    </div>
                                    <span style="color: #4caf50;">✅</span>
                                </div>
                            `).join('')
                            : '<div class="empty-state">本月无完成任务</div>'
                        }
                    </div>
                </div>
                
                <div class="export-actions">
                    <button class="export-btn" onclick="exportReport('html')">📥 导出HTML</button>
                    <button class="export-btn" onclick="window.print()">🖨️ 打印报告</button>
                </div>
            `;
        }
        
        function showReport(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('report-content').innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
            loadReport(type);
        }
        
        async function exportReport(format) {
            const res = await authFetch(`${API}/report/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: currentReport, format })
            });
            
            // 下载文件
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentReport}_report.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 初始化
        (async () => { const u = await initAuthPage(); if (u) loadReport('weekly'); })();
    </script>
    <script src="dark-mode.js"></script>
</body>
</html>
